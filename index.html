<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Officials — Seed 13 Productions</title>
    <style>
        :root { --bg:#0f0f0f; --card-bg:#1a1a2e; --accent:#f59e0b; --text:#fff; --muted:#a0a0a0; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
               background:var(--bg); color:var(--text); min-height:100vh; }
        header { background:rgba(0,0,0,.9); padding:1.5rem 2rem; text-align:center;
                 border-bottom:2px solid var(--accent); }
        header h1 { font-size:2.2rem; font-weight:700; color:var(--accent); margin-bottom:.4rem; }
        header p { color:var(--muted); font-size:.95rem; }
        header a { color:var(--accent); text-decoration:none; }
        header a:hover { text-decoration:underline; }
        .gallery { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
                   gap:1.5rem; padding:2rem; max-width:1400px; margin:0 auto; }
        .card { background:var(--card-bg); border-radius:12px; overflow:hidden;
                border:1px solid rgba(245,158,11,.2); box-shadow:0 4px 20px rgba(0,0,0,.4);
                transition:transform .25s, box-shadow .25s; }
        .card:hover { transform:translateY(-6px); box-shadow:0 8px 30px rgba(245,158,11,.25); }
        .card img { width:100%; height:480px; object-fit:cover; object-position:top;
                    display:block; user-select:none; -webkit-user-drag:none; }
        .card .caption { padding:.8rem 1rem; font-size:.9rem; font-weight:600;
                         color:var(--accent); text-align:center; letter-spacing:.03em; }
        footer { text-align:center; padding:2rem; color:var(--muted); font-size:.85rem;
                 border-top:1px solid rgba(255,255,255,.1); margin-top:2rem; }
        footer a { color:var(--accent); text-decoration:none; }
    </style>
</head>
<body>
    <header>
        <h1>🏈 Sports Officials</h1>
        <p>Vintage pinup art meets the sporting world &nbsp;|&nbsp; <a href="https://seed13.com/">← Seed 13 Productions</a></p>
    </header>
    <div class="gallery">
        <div class="card">
            <img src="images/baseball-umpire-pinup.jpg" alt="Baseball Umpire Pinup">
            <div class="caption">Baseball Umpire</div>
        </div>
        <div class="card">
            <img src="images/basketball-ref-pinup.jpg" alt="Basketball Referee Pinup">
            <div class="caption">Basketball Referee</div>
        </div>
        <div class="card">
            <img src="images/football-ref-pinup.jpg" alt="Football Referee Pinup">
            <div class="caption">Football Referee</div>
        </div>
        <div class="card">
            <img src="images/hockey-ref-pinup.jpg" alt="Hockey Referee Pinup">
            <div class="caption">Hockey Referee</div>
        </div>
        <div class="card">
            <img src="images/soccer-ref-pinup.jpg" alt="Soccer Referee Pinup">
            <div class="caption">Soccer Referee</div>
        </div>
    </div>
    <footer>&copy; 2025 Seed 13 Productions &nbsp;|&nbsp; <a href="https://seed13.com/">seed13.com</a> &nbsp;|&nbsp; #nokings</footer>
</body>
</html>
